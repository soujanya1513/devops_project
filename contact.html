<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System - Contact Us</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 60%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            text-align: center;
        }

        .contact-info {
            margin-top: 20px;
            line-height: 2;
            font-size: 18px;
        }

        .contact-info strong {
            color: #4CAF50;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: #333;
            color: white;
            margin-top: 30px;
        }

        .contact-form {
            margin-top: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Event Management System</h1>
    </div>

    <div class="container">
        <h2>Contact Us</h2>

        <div class="contact-info">
            <p><strong>Company:</strong> ABC Event Management</p>
            <p><strong>Address:</strong> 123 Event Street, Bangalore, India</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Email:</strong> info@abcevents.com</p>
            <p><strong>Website:</strong> www.abcevents.com</p>
        </div>

        <div class="contact-form">
            <h3>Send Us a Message</h3>

            <form>
                <label>Your Name</label>
                <input type="text" placeholder="Enter your name" required>

                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Message</label>
                <textarea rows="5" placeholder="Write your message here..." required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <div class="footer">
        © 2026 Event Management System | All Rights Reserved
    </div>

</body>
</html>
