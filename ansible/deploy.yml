---
- name: Deploy event management app
  hosts: web
  become: true
  collections:
    - community.docker
  vars:
    app_name: event-management-webapp
    image_name: "{{ lookup('env', 'IMAGE_NAME') | default('event-management-webapp:latest', true) }}"
    host_port: 80
    container_port: 3000
  tasks:
    - name: Install Docker and Python packages
      apt:
        name:
          - docker.io
          - python3-pip
        update_cache: true
        state: present

    - name: Install Docker SDK for Python
      pip:
        name: docker

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull app image
      docker_image:
        name: "{{ image_name }}"
        source: pull

    - name: Run app container
      docker_container:
        name: "{{ app_name }}"
        image: "{{ image_name }}"
        state: started
        restart_policy: always
        ports:
          - "{{ host_port }}:{{ container_port }}"
